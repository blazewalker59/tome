<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!--
    Tome favicon. Matches the lucide `BookOpen` icon used in the header
    wordmark and the Library bottom-tab, so the brand mark is consistent
    across app chrome and browser tab.

    Paths are copied verbatim from lucide-react's `BookOpen` (MIT,
    https://lucide.dev/icons/book-open): two mirrored page panels that
    meet at a central spine.

    Background: a cream rounded square (the light theme's foam token,
    #f8f2e2) so the icon always reads on light or dark browser chrome.
    We stop relying on prefers-color-scheme for legibility and instead
    brand the favicon with the app's light-theme panel color.

    Stroke stays the deep lagoon ink so it has strong contrast against
    the cream background in both modes.
  -->

  <!-- Cream panel background, rounded to feel like an app tile. -->
  <rect x="0" y="0" width="24" height="24" rx="5" ry="5" fill="#f8f2e2" />

  <g
    stroke="#1f2e25"
    fill="none"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M12 7v14" />
    <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z" />
  </g>
</svg>
